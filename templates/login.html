<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root{
            --sky-1: #88d6ff;
            --sky-2: #58b2ff;
            --sky-3: #1b83ea;
            --glass: rgba(255, 255, 255, 0.3);
            --glass-strong: rgba(255, 255, 255, 0.42);
            --line: rgba(255, 255, 255, 0.7);
            --text: #0a3560;
            --aqua: #0f8fff;
            --aqua-soft: #69d5ff;
        }

        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 650px at 15% 12%, rgba(255,255,255,0.75), transparent 55%),
                radial-gradient(900px 550px at 85% 75%, rgba(170, 240, 255, 0.55), transparent 60%),
                linear-gradient(155deg, var(--sky-1), var(--sky-2) 40%, var(--sky-3));
        }

        body::before,
        body::after{
            content: "";
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(1px);
        }

        body::before{
            width: 420px;
            height: 420px;
            top: -120px;
            right: -80px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), rgba(255,255,255,0.08));
            opacity: 0.8;
        }

        body::after{
            width: 520px;
            height: 520px;
            bottom: -180px;
            left: -140px;
            background: radial-gradient(circle at 35% 35%, rgba(150, 245, 255, 0.6), rgba(255,255,255,0.02));
            opacity: 0.85;
        }

        .burbuja{
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle at 28% 25%, rgba(255,255,255,0.86), rgba(255,255,255,0.14) 55%, rgba(80,200,255,0.2));
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 10px 22px rgba(13, 76, 130, 0.25);
            animation: flotar 11s ease-in-out infinite;
        }

        .burbuja.b1{ width: 84px; height: 84px; top: 16%; left: 10%; }
        .burbuja.b2{ width: 46px; height: 46px; top: 23%; right: 18%; animation-delay: -3s; }
        .burbuja.b3{ width: 64px; height: 64px; bottom: 18%; right: 11%; animation-delay: -6s; }

        @keyframes flotar{
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-12px) translateX(7px); }
        }

        .contenedor{
            width: min(92vw, 380px);
            position: relative;
            padding: 28px 24px 22px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.22) 45%, rgba(255,255,255,0.35));
            backdrop-filter: blur(9px) saturate(140%);
            box-shadow:
                0 18px 30px rgba(0, 57, 112, 0.28),
                inset 0 1px 0 rgba(255,255,255,0.9),
                inset 0 -10px 20px rgba(84, 178, 255, 0.15);
        }

        .contenedor::before{
            content: "";
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            height: 32%;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0));
            pointer-events: none;
        }

        h2{
            margin: 6px 0 4px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .sub{
            margin: 0 0 16px;
            text-align: center;
            color: rgba(10, 53, 96, 0.8);
            font-size: 0.92rem;
        }

        input{
            width: 100%;
            padding: 11px 12px;
            margin: 7px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.86);
            color: #0b3d71;
            background: linear-gradient(180deg, var(--glass-strong), rgba(255,255,255,0.25));
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 2px 7px rgba(8, 84, 150, 0.1);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input::placeholder{
            color: rgba(10, 53, 96, 0.55);
        }

        input:focus{
            border-color: rgba(255,255,255,1);
            box-shadow: 0 0 0 3px rgba(114, 213, 255, 0.28), inset 0 1px 1px rgba(255,255,255,0.8);
            transform: translateY(-1px);
        }

        button{
            width: 100%;
            margin-top: 10px;
            padding: 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.9);
            background:
                linear-gradient(180deg, #95ebff 0%, #42c3ff 45%, #1590ef 46%, #0f7cdf 100%);
            color: white;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.9),
                inset 0 -2px 6px rgba(1, 68, 133, 0.35),
                0 10px 18px rgba(4, 87, 170, 0.32);
            transition: transform 0.15s ease, filter 0.2s ease;
        }

        button:hover{
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        button:active{
            transform: translateY(1px);
        }

        .mensaje{
            min-height: 20px;
            margin-top: 11px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: #c21f33;
            text-shadow: 0 1px 0 rgba(255,255,255,0.75);
        }

        .oculto{
            opacity: 0;
        }

        @media (max-width: 480px){
            .contenedor{
                padding: 24px 18px 20px;
                border-radius: 17px;
            }

            h2{
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="burbuja b1"></div>
    <div class="burbuja b2"></div>
    <div class="burbuja b3"></div>

    <div class="contenedor">
        <h2>Iniciar sesión</h2>
        <p class="sub">Bienvenido de nuevo</p>
        <form action="/login" method="post">
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="clave" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
        <div class="mensaje {% if not mensaje %}oculto{% endif %}">{{ mensaje }}</div>
    </div>
</body>
</html>
